"$schema" = 'https://starship.rs/config-schema.json'

palette = 'catppuccin_mocha'

[directory]
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "…/"

[nodejs]
symbol = ""
format = '[[ $symbol( $version) ](fg:green)]($style)'

[c]
symbol = " "
format = '[[ $symbol( $version) ](fg:blue)]($style)'

[cpp]
symbol = " "
format = '[[ $symbol( $version) ](fg:sapphire)]($style)'

[rust]
symbol = ""
format = '[[ $symbol( $version) ](fg:peach)]($style)'

[golang]
symbol = ""
format = '[[ $symbol( $version) ](fg:sky)]($style)'

[php]
symbol = "󰌟"
format = '[[ $symbol( $version) ](fg:lavender)]($style)'

[java]
symbol = ""
format = '[[ $symbol( $version) ](fg:red)]($style)'

[kotlin]
symbol = "󱈙"
format = '[[ $symbol( $version) ](fg:mauve)]($style)'

[haskell]
symbol = ""
format = '[[ $symbol( $version) ](fg:mauve)]($style)'

[python]
symbol = ""
format = '[[ $symbol( $version) ](fg:yellow)]($style)'

[docker_context]
symbol = ""
format = '[[ $symbol( $context) ](fg:teal)]($style)'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
